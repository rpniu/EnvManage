name: Build and Release

on:
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发发布
  push:
    tags:
      - 'v*' # 只有推送以 v 开头的 tag（例如 v1.0.0）时触发工作流

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write # 允许 GitHub Actions 自动创建 Release

jobs:
  build-and-release:
    name: Build & Release for ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: windows-latest # 使用 Windows 运行器进行本机编译
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
          # 添加更多架构，例如：
          # - os: windows
          #   arch: arm64

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21.0' # 确保使用支持的 Go 版本

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
        
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        shell: pwsh
        run: |
          if (Test-Path package-lock.json) { Remove-Item package-lock.json -Force }
          if (Test-Path node_modules)     { Remove-Item node_modules -Recurse -Force }
          npm install --force
          # Fix: explicitly install native bindings for Tailwind v4 on Windows
          npm install @tailwindcss/oxide-win32-x64-msvc lightningcss-win32-x64-msvc --no-save --force
          npm rebuild

      - name: Build Windows App
        shell: pwsh
        run: wails build -platform ${{ matrix.os }}/${{ matrix.arch }}

      - name: Rename Release Asset
        shell: pwsh
        run: Rename-Item -Path build/bin/EnvManage.exe -NewName "EnvManage-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.exe"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/EnvManage-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.exe
          name: EnvManage ${{ github.ref_name }}
          generate_release_notes: true # 自动根据 commit 生成 Release 记录
