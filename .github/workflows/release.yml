name: Build and Release

on:
  push:
    tags:
      - 'v*' # 只有推送以 v 开头的 tag（例如 v1.0.0）时触发工作流

permissions:
  contents: write # 允许 GitHub Actions 自动创建 Release

jobs:
  build-and-release:
    name: Build & Release for Windows
    runs-on: windows-latest # 使用 Windows 运行器进行本机编译

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21.0' # 确保使用支持的 Go 版本

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
        
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Windows App
        shell: pwsh
        run: wails build -platform windows/amd64

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/EnvManage.exe
          name: EnvManage ${{ github.ref_name }}
          generate_release_notes: true # 自动根据 commit 生成 Release 记录
